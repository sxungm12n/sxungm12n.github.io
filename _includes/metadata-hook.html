<!-- A placeholder to allow defining custom metadata -->

<!-- Collapsible sidebar: restore saved state early (avoids flash) + wire toggle -->
<script>
  (function () {
    var KEY = 'sidebar-collapse';
    try {
      if (localStorage.getItem(KEY) === 'true') {
        document.documentElement.setAttribute(KEY, '');
      }
    } catch (e) {}

    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('sidebar-collapse-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var root = document.documentElement;
        var collapsed = root.hasAttribute(KEY);
        if (collapsed) {
          root.removeAttribute(KEY);
        } else {
          root.setAttribute(KEY, '');
        }
        try {
          localStorage.setItem(KEY, (!collapsed).toString());
        } catch (e) {}
      });
    });
  })();
</script>
