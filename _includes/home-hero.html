<section class="blog-hero" aria-label="소개">
  <div class="blog-hero-accent" aria-hidden="true"></div>
  <div class="blog-hero-inner">
    <div class="blog-hero-content">
      <p class="blog-hero-eyebrow">안녕하세요! 👋</p>
      <h1 class="blog-hero-title">{{ site.social.name | default: site.title }}</h1>
      <p class="blog-hero-desc">{{ site.tagline }}</p>
    </div>

    <div class="blog-hero-side">
      <div class="blog-hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-value">{{ site.posts.size }}</span>
          <span class="hero-stat-label">게시글</span>
        </div>
      </div>
      <div class="blog-hero-actions">
        <a class="hero-btn hero-btn-primary" href="{{ '/archives/' | relative_url }}">글 모아보기</a>
        <a class="hero-btn hero-btn-ghost" href="{{ '/about/' | relative_url }}">소개</a>
      </div>
    </div>
  </div>
</section>
